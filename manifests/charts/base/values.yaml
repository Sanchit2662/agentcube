# Default values for agentcube.

# Global settings
imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# Redis Configuration
# These must be provided by the user during installation
redis:
  addr: ""
  password: ""

# AgentCube Router
router:
  replicas: 1
  image:
    repository: ghcr.io/volcano-sh/agentcube-router
    pullPolicy: IfNotPresent
    tag: "latest"
  service:
    type: ClusterIP
    port: 8080
    targetPort: 8080
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi
  config: {}
  extraEnv: []
  serviceAccountName: ""
  rbac:
    create: false

# AgentCube Workload Manager
workloadmanager:
  replicas: 1
  image:
    repository: ghcr.io/volcano-sh/workloadmanager
    pullPolicy: IfNotPresent
    tag: "latest"
  service:
    type: ClusterIP
    port: 8080
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi
  extraEnv: []
  networkPolicy:
    # routerSelector is the pod label selector used to identify the router pod.
    # Applied as the mandatory ingress allow rule when SandboxNetworkPolicy.Mode=Restricted.
    # Format: comma-separated key=value pairs, e.g. "app=agentcube-router,tier=proxy"
    routerSelector: "app=agentcube-router"
    # routerNamespace is the namespace the router runs in.
    # Used to build the cross-namespace NamespaceSelector for the router→sandbox ingress rule.
    # Defaults to the workloadmanager's own namespace when left empty.
    routerNamespace: ""

# Volcano Agent Scheduler
volcano:
  scheduler:
    enabled: false
    replicas: 1
    image:
      repository: ghcr.io/volcano-sh/vc-agent-scheduler
      pullPolicy: IfNotPresent
      tag: "latest"
